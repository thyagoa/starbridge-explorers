<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#020509">
<title>STARBRIDGE EXPLORERS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --c-bg: #020509; --c-border: #0a2a40; --c-accent: #0e7fc4; --c-accent2: #e8a020;
    --c-text: #7ab8d8; --c-dim: #2a5070; --c-ok: #1d9e75;
    --font-mono: 'Share Tech Mono', monospace; --font-disp: 'Orbitron', monospace;
  }
  body {
    background: var(--c-bg); color: var(--c-text); font-family: var(--font-mono);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 20px;
  }
  #scanline { position: fixed; top:0; left:0; width:100%; height:2px;
    background:rgba(14,127,196,0.06); animation:scan 8s linear infinite; pointer-events:none; z-index:999; }
  @keyframes scan { from{top:0} to{top:100%} }
  #vignette { position:fixed; inset:0; pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 40%, rgba(2,5,9,0.6) 100%); }

  .container { width: 100%; max-width: 520px; text-align: center; position: relative; z-index: 1; }

  .logo { font-family: var(--font-disp); font-size: clamp(24px,5vw,42px); color: var(--c-accent2);
    letter-spacing: 4px; margin-bottom: 6px; }
  .tagline { font-size: 12px; color: var(--c-dim); letter-spacing: 3px; margin-bottom: 40px; }

  .card {
    background: rgba(6,9,15,0.9); border: 1px solid var(--c-border);
    border-radius: 14px; padding: 30px 28px; margin-bottom: 16px;
    backdrop-filter: blur(6px);
  }
  .card-title { font-family: var(--font-disp); font-size: 13px; letter-spacing:2px;
    color: var(--c-dim); margin-bottom: 20px; text-transform: uppercase; }

  .btn-primary {
    width: 100%; padding: 16px; background: #0d2535; border: 2px solid var(--c-accent);
    border-radius: 10px; color: var(--c-text); font-family: var(--font-disp);
    font-size: 15px; letter-spacing: 2px; cursor: pointer; transition: all 0.2s;
    text-transform: uppercase;
  }
  .btn-primary:hover { background: var(--c-accent); color: #fff; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.4; cursor: default; }

  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--c-dim); font-size: 11px; }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background: var(--c-border); }

  .join-row { display: flex; gap: 10px; }
  .code-input {
    flex: 1; padding: 13px 16px; background: #030810; border: 1px solid var(--c-border);
    border-radius: 8px; color: var(--c-accent2); font-family: var(--font-disp);
    font-size: 18px; letter-spacing: 4px; text-transform: uppercase; outline: none;
    text-align: center;
  }
  .code-input:focus { border-color: var(--c-accent2); }
  .code-input::placeholder { color: var(--c-dim); font-size: 12px; letter-spacing: 2px; }

  .role-select {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px;
  }
  .role-btn {
    padding: 12px 8px; background: transparent; border: 1px solid var(--c-border);
    border-radius: 8px; color: var(--c-dim); font-family: var(--font-mono);
    font-size: 12px; cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .role-btn:hover   { border-color: var(--c-accent); color: var(--c-text); }
  .role-btn.selected { border-color: var(--c-accent); background: rgba(14,127,196,0.15); color: var(--c-accent); }
  .role-btn .r-icon { font-size: 18px; display: block; margin-bottom: 4px; }

  .btn-join {
    width: 100%; margin-top: 14px; padding: 13px;
    background: transparent; border: 1px solid var(--c-ok);
    border-radius: 8px; color: var(--c-ok); font-family: var(--font-disp);
    font-size: 13px; letter-spacing: 2px; cursor: pointer; transition: all 0.2s;
    text-transform: uppercase;
  }
  .btn-join:hover { background: var(--c-ok); color: #fff; }
  .btn-join:disabled { opacity: 0.3; cursor: default; }

  #status-msg { font-size: 12px; color: var(--c-dim); margin-top: 12px; min-height: 18px; }
  #status-msg.error { color: #d85a30; }
  #status-msg.ok    { color: var(--c-ok); }

  .footer-hint { font-size: 11px; color: var(--c-dim); margin-top: 24px; line-height: 1.8; }
  .footer-hint strong { color: var(--c-text); }
</style>
</head>
<body>
<div id="scanline"></div>
<div id="vignette"></div>

<div class="container">
  <div class="logo">STARBRIDGE</div>
  <div class="tagline">EXPLORERS // COOPERATIVE SPACE MISSION</div>

  <!-- Create session -->
  <div class="card">
    <div class="card-title">Capitão — Nova Sessão</div>
    <button class="btn-primary" id="create-btn" onclick="createSession()">▶ Criar Sessão</button>
    <div id="status-msg"></div>
  </div>

  <!-- Join session -->
  <div class="card">
    <div class="card-title">Tripulação — Entrar na Sessão</div>
    <div class="join-row">
      <input class="code-input" id="code-input" type="text" maxlength="9"
        placeholder="XXXX-0000" oninput="formatCode(this)" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="role-select">
      <div class="role-btn" onclick="selectRole('helm',this)">
        <span class="r-icon">🧭</span>Helm
      </div>
      <div class="role-btn" onclick="selectRole('engineering',this)">
        <span class="r-icon">⚡</span>Engenharia
      </div>
      <div class="role-btn" onclick="selectRole('viewscreen',this)" style="grid-column:1/-1">
        <span class="r-icon">📺</span>Viewscreen (TV)
      </div>
    </div>
    <button class="btn-join" id="join-btn" onclick="joinSession()" disabled>Entrar na Sessão</button>
  </div>

  <div class="footer-hint">
    <strong>Como jogar:</strong><br>
    1. Capitão cria a sessão e abre no PC<br>
    2. Helm e Engenharia entram pelo celular com o código<br>
    3. Viewscreen abre na TV — o Capitão vê o QR na tela
  </div>
</div>

<script>
let selectedRole = null;

function formatCode(input) {
  let val = input.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
  if (val.length > 4) val = val.slice(0,4) + '-' + val.slice(4,8);
  input.value = val;
  updateJoinBtn();
}

function selectRole(role, el) {
  selectedRole = role;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  updateJoinBtn();
}

function updateJoinBtn() {
  const code = document.getElementById('code-input').value;
  const valid = /^[A-Z]{4}-[0-9]{4}$/.test(code) && selectedRole;
  document.getElementById('join-btn').disabled = !valid;
}

function setStatus(msg, type = '') {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = type;
}

async function createSession() {
  const btn = document.getElementById('create-btn');
  btn.disabled = true;
  setStatus('Criando sessão...');
  try {
    const res = await fetch('/api/sessions', { method: 'POST' });
    const data = await res.json();
    if (data.code) {
      setStatus(`Sessão criada: ${data.code}`, 'ok');
      setTimeout(() => {
        location.href = `/captain/${data.code}`;
      }, 600);
    } else {
      setStatus('Erro ao criar sessão.', 'error');
      btn.disabled = false;
    }
  } catch {
    setStatus('Servidor indisponível.', 'error');
    btn.disabled = false;
  }
}

function joinSession() {
  const code = document.getElementById('code-input').value.trim().toUpperCase();
  if (!selectedRole || !/^[A-Z]{4}-[0-9]{4}$/.test(code)) return;
  location.href = `/${selectedRole}/${code}`;
}

// Allow Enter to join
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('join-btn').disabled) joinSession();
});
</script>
</body>
</html>
