<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#020509">
<title>ENGINEERING // Power Management</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --c-bg: #020509; --c-panel: rgba(6,9,15,0.9); --c-border: #0a2a40;
    --c-accent: #0e7fc4; --c-accent2: #e8a020; --c-text: #7ab8d8; --c-dim: #2a5070;
    --c-ok: #1d9e75; --c-warn: #e8a020; --c-crit: #d85a30;
    --font-mono: 'Share Tech Mono', monospace; --font-disp: 'Orbitron', monospace;
  }
  body {
    background: var(--c-bg); color: var(--c-text); font-family: var(--font-mono);
    height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
  }

  /* TOP BAR */
  #top-bar {
    background: var(--c-panel); border-bottom: 1px solid var(--c-border);
    padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0; backdrop-filter: blur(6px);
  }
  .station-title { font-family: var(--font-disp); font-size: 14px; color: var(--c-accent2); }
  .station-sub   { font-size: 10px; color: var(--c-dim); margin-top: 2px; }
  .top-stats { display: flex; gap: 16px; align-items: center; }
  .ts { text-align: right; }
  .ts-label { font-size: 9px; color: var(--c-dim); text-transform: uppercase; }
  .ts-val   { font-size: 13px; color: var(--c-text); }
  .ts-val.warn { color: var(--c-warn); }
  .ts-val.crit { color: var(--c-crit); }
  #conn-dot { width:8px; height:8px; border-radius:4px; background:var(--c-crit); transition:background 0.3s; }
  #conn-dot.ok { background: var(--c-ok); }

  /* REACTOR LOAD BAR */
  #reactor-header {
    padding: 10px 14px 8px; flex-shrink: 0;
    background: rgba(6,9,15,0.5); border-bottom: 1px solid var(--c-border);
  }
  .reactor-title {
    font-family: var(--font-disp); font-size: 11px; letter-spacing:2px; color: var(--c-dim);
    margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center;
  }
  .reactor-title .load-val { font-size: 13px; }
  .reactor-title .load-val.ok   { color: var(--c-ok); }
  .reactor-title .load-val.warn { color: var(--c-warn); }
  .reactor-title .load-val.crit { color: var(--c-crit); animation: blink 0.6s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .reactor-bar-wrap {
    height: 10px; background: #0a1520; border-radius: 5px; overflow: hidden;
    border: 1px solid var(--c-border); position: relative;
  }
  .reactor-bar-fill {
    height: 100%; border-radius:5px; transition: width 0.3s, background 0.3s;
  }
  /* Capacity marker at 100% */
  .reactor-bar-cap {
    position: absolute; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.3);
    pointer-events: none;
  }

  /* OVERLOAD ALERT */
  #overload-alert {
    margin: 0 14px 8px;
    padding: 8px 12px; border-radius: 8px; border: 1px solid var(--c-crit);
    background: rgba(216,90,48,0.1); font-family: var(--font-disp); font-size: 11px;
    color: var(--c-crit); letter-spacing:1px; text-align: center;
    display: none; animation: blink 0.8s infinite;
    flex-shrink: 0;
  }
  #overload-alert.active { display: block; }

  /* SYSTEMS GRID */
  #systems-list {
    flex: 1; overflow-y: auto; padding: 6px 10px; display: flex; flex-direction: column; gap: 8px;
  }
  #systems-list::-webkit-scrollbar { display: none; }

  .sys-card {
    background: rgba(6,9,15,0.7); border: 1px solid var(--c-border);
    border-radius: 10px; padding: 10px 12px; transition: border-color 0.2s;
  }
  .sys-card.sys-overloading { border-color: var(--c-warn); }

  .sys-row1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .sys-name { font-family: var(--font-disp); font-size: 12px; letter-spacing:1px; }
  .sys-badges { display: flex; gap: 6px; align-items: center; }
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; border: 1px solid; }
  .badge.alloc  { border-color: var(--c-accent); color: var(--c-accent); }
  .badge.health { border-color: var(--c-dim); color: var(--c-dim); }
  .badge.health.warn { border-color: var(--c-warn); color: var(--c-warn); }
  .badge.health.crit { border-color: var(--c-crit); color: var(--c-crit); }
  .badge.ol-badge { border-color: var(--c-warn); color: var(--c-warn); font-size:9px; animation: blink 0.8s infinite; }

  .health-bar { height: 4px; background: #0a1520; border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
  .health-fill { height: 100%; border-radius:2px; transition: width 0.4s; }

  .sys-row2 { display: flex; gap: 10px; align-items: center; }
  input[type=range].alloc-slider {
    -webkit-appearance: none; appearance: none; flex:1; height: 8px;
    background: var(--c-border); border-radius: 4px; outline: none; cursor: pointer;
  }
  input[type=range].alloc-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 24px; height: 24px; border-radius: 12px;
    background: var(--c-accent); border: 2px solid #fff; box-shadow: 0 0 8px rgba(14,127,196,0.5);
  }

  .btn-overload {
    padding: 7px 11px; font-size: 10px; font-family: var(--font-disp); letter-spacing:1px;
    border: 1px solid var(--c-warn); background: transparent; color: var(--c-warn);
    border-radius: 6px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .btn-overload:active  { background: var(--c-warn); color: #000; }
  .btn-overload.active  { background: rgba(232,160,32,0.2); }
  .btn-overload:disabled { opacity: 0.25; cursor: default; }

  /* BOTTOM BAR */
  #bottom-bar {
    background: var(--c-panel); border-top: 1px solid var(--c-border);
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom,0px));
    display: flex; gap: 10px; flex-shrink: 0;
  }
  .btn-action {
    flex: 1; padding: 12px; border-radius: 8px; font-family: var(--font-disp);
    font-size: 11px; letter-spacing:1px; text-transform: uppercase; cursor: pointer;
    border: 1px solid var(--c-accent); background: #0d2535; color: var(--c-text); transition: all 0.2s;
  }
  .btn-action:active { background: var(--c-accent); color:#fff; }
  .btn-action.secondary { border-color: var(--c-dim); color: var(--c-dim); background: transparent; }
  .btn-action.secondary:active { background: var(--c-dim); color: #fff; }

  /* TOAST */
  #alert-toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--c-crit); color:#fff; font-family: var(--font-disp); font-size: 12px;
    padding: 10px 20px; border-radius: 20px; opacity: 0; transition: all 0.3s; z-index: 100;
    pointer-events: none; white-space: nowrap;
  }
  #alert-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="top-bar">
  <div>
    <div class="station-title">ENGINEERING</div>
    <div class="station-sub" id="top-sub">Power Management // aguardando...</div>
  </div>
  <div class="top-stats">
    <div class="ts"><div class="ts-label">Hull</div><div class="ts-val" id="stat-hull">—</div></div>
    <div class="ts"><div class="ts-label">Timer</div><div class="ts-val" id="stat-timer">—</div></div>
    <div id="conn-dot"></div>
  </div>
</div>

<div id="reactor-header">
  <div class="reactor-title">
    <span>CARGA DO REATOR</span>
    <span class="load-val ok" id="load-val">90 / 100</span>
  </div>
  <div class="reactor-bar-wrap">
    <div class="reactor-bar-fill" id="reactor-fill" style="width:90%;background:var(--c-ok)"></div>
    <div class="reactor-bar-cap" id="reactor-cap" style="left:100%"></div>
  </div>
</div>

<div id="overload-alert">⚠ SOBRECARGA — DANO AO CASCO ATIVO</div>

<div id="systems-list"></div>

<div id="bottom-bar">
  <button class="btn-action" onclick="sendStatusToViewscreen()">Enviar Status</button>
  <button class="btn-action secondary" onclick="setAllToDefault()">Reset Padrão</button>
</div>

<div id="alert-toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const sessionCode = location.pathname.split('/').pop().toUpperCase();

const SYSTEM_META = {
  propulsion:  { label: 'PROPULSÃO',    icon: '⚡', canOverload: true  },
  shields:     { label: 'ESCUDOS',      icon: '🛡', canOverload: true  },
  lifeSupport: { label: 'SUPORTE VIDA', icon: '♻', canOverload: false },
  sensors:     { label: 'SENSORES',     icon: '📡', canOverload: true  },
  navComputer: { label: 'NAV COMP.',    icon: '🖥', canOverload: false },
};
const SYSTEM_KEYS = Object.keys(SYSTEM_META);
const DEFAULT_ALLOCATION = { propulsion:30, shields:20, lifeSupport:15, sensors:15, navComputer:10 };
const REACTOR_OUTPUT = 100;

let allocation   = { ...DEFAULT_ALLOCATION };
let systemHealth = { propulsion:100, shields:100, lifeSupport:100, sensors:100, navComputer:100 };
let overloads    = {};
let ws = null, connected = false;
let sendTimeout  = null;

// ── WebSocket ──────────────────────────────────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/engineering/${sessionCode}`);

  ws.onopen = () => {
    connected = true;
    document.getElementById('conn-dot').classList.add('ok');
    document.getElementById('top-sub').textContent = 'Power Management // conectado';
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'role_assigned' || msg.type === 'game_state') {
      if (msg.energy)  { allocation = { ...msg.energy.allocation }; overloads = { ...msg.energy.overloads }; }
      if (msg.systems) systemHealth = { ...msg.systems };
      if (msg.ship)    updateTopStats(msg.ship);
      if (msg.mission) updateTimer(msg.mission);
      renderAll();
    }
    if (msg.type === 'error') showAlert(msg.reason);
  };
  ws.onclose = () => {
    connected = false;
    document.getElementById('conn-dot').classList.remove('ok');
    document.getElementById('top-sub').textContent = 'Power Management // desconectado';
    setTimeout(connect, 3000);
  };
}

function updateTopStats(ship) {
  const el = document.getElementById('stat-hull');
  el.textContent = Math.round(ship.hull) + '%';
  el.className = 'ts-val' + (ship.hull < 30 ? ' crit' : ship.hull < 60 ? ' warn' : '');
}
function updateTimer(mission) {
  const t = Math.max(0, Math.round(mission.timer));
  const el = document.getElementById('stat-timer');
  el.textContent = `${String(Math.floor(t/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`;
  el.className = 'ts-val' + (t < 60 ? ' crit' : t < 120 ? ' warn' : '');
}

// ── Energy logic ───────────────────────────────────────────────────────────
function onSliderChange(key, value) {
  // Each slider is fully independent — no redistribution
  allocation[key] = Math.max(0, Math.min(value, systemHealth[key]));
  renderAll();
  scheduleServerUpdate();
}

function setAllToDefault() {
  SYSTEM_KEYS.forEach(k => {
    allocation[k] = Math.min(DEFAULT_ALLOCATION[k], systemHealth[k]);
  });
  renderAll();
  scheduleServerUpdate();
}

function scheduleServerUpdate() {
  clearTimeout(sendTimeout);
  sendTimeout = setTimeout(sendEnergyUpdate, 80);
}

function sendEnergyUpdate() {
  if (!connected || !ws) return;
  ws.send(JSON.stringify({ type: 'energy_update', allocation }));
}

function triggerOverload(key) {
  if (!connected || !ws) return;
  if (!SYSTEM_META[key].canOverload) { showAlert(`${SYSTEM_META[key].label} não pode sofrer overload`); return; }
  ws.send(JSON.stringify({ type: 'overload', system: key }));
  showAlert(`OVERLOAD: ${SYSTEM_META[key].label}`, 'warn');
}

function sendStatusToViewscreen() {
  if (!connected || !ws) return;
  ws.send(JSON.stringify({ type: 'send_to_viewscreen', payload: { view: 'engineering', allocation, systemHealth } }));
  showAlert('Status enviado ao Viewscreen', 'ok');
}

// ── Rendering ──────────────────────────────────────────────────────────────
function computeLoad() {
  return SYSTEM_KEYS.reduce((s, k) => s + (allocation[k] ?? 0), 0);
}

function renderAll() {
  renderReactorBar();
  SYSTEM_KEYS.forEach(renderCard);
}

function renderReactorBar() {
  const load     = computeLoad();
  const pct      = Math.min((load / REACTOR_OUTPUT) * 100, 100);
  const overload = load > REACTOR_OUTPUT;
  const color    = overload ? 'var(--c-crit)' : load >= 80 ? 'var(--c-warn)' : 'var(--c-ok)';
  const cls      = overload ? 'crit' : load >= 80 ? 'warn' : 'ok';

  document.getElementById('reactor-fill').style.cssText = `width:${pct}%;background:${color}`;
  const loadEl = document.getElementById('load-val');
  loadEl.textContent = `${load} / ${REACTOR_OUTPUT}`;
  loadEl.className = `load-val ${cls}`;
  document.getElementById('overload-alert').classList.toggle('active', overload);
}

function renderCard(key) {
  const meta   = SYSTEM_META[key];
  const alloc  = allocation[key] ?? 0;
  const health = systemHealth[key] ?? 100;
  const now    = Date.now();
  const isOL   = overloads[key] && overloads[key] > now;
  const olSecs = isOL ? Math.ceil((overloads[key] - now) / 1000) : 0;

  let card = document.getElementById(`card-${key}`);
  if (!card) {
    card = document.createElement('div');
    card.className = 'sys-card';
    card.id = `card-${key}`;
    card.innerHTML = `
      <div class="sys-row1">
        <div class="sys-name">${meta.icon} ${meta.label}</div>
        <div class="sys-badges" id="badges-${key}"></div>
      </div>
      <div class="health-bar"><div class="health-fill" id="hbar-${key}"></div></div>
      <div class="sys-row2">
        <input type="range" class="alloc-slider" id="slider-${key}" min="0" max="${health}" value="${alloc}" step="1">
        <button class="btn-overload" id="btn-ol-${key}"
          onclick="triggerOverload('${key}')"
          ${!meta.canOverload ? 'disabled style="opacity:0.15"' : ''}>OL</button>
      </div>`;
    document.getElementById('systems-list').appendChild(card);
    document.getElementById(`slider-${key}`).addEventListener('input', (e) => {
      onSliderChange(key, parseInt(e.target.value));
    });
  }

  // Update badges
  const badgesEl = document.getElementById(`badges-${key}`);
  const healthCls = health < 30 ? ' crit' : health < 60 ? ' warn' : '';
  badgesEl.innerHTML =
    `<span class="badge alloc">${alloc}%</span>` +
    `<span class="badge health${healthCls}">${health}%</span>` +
    (isOL ? `<span class="badge ol-badge">OL ${olSecs}s</span>` : '');

  // Update health bar
  document.getElementById(`hbar-${key}`).style.cssText =
    `width:${health}%;background:${health < 30 ? '#d85a30' : health < 60 ? '#e8a020' : '#1d9e75'}`;

  // Update slider (only if not being actively touched)
  const slider = document.getElementById(`slider-${key}`);
  slider.max = health;
  if (document.activeElement !== slider) slider.value = alloc;

  // Update overload button
  const olBtn = document.getElementById(`btn-ol-${key}`);
  if (olBtn && meta.canOverload) {
    olBtn.className = 'btn-overload' + (isOL ? ' active' : '');
    olBtn.disabled  = isOL;
  }

  card.className = 'sys-card' + (isOL ? ' sys-overloading' : '');
}

function showAlert(msg, type = 'error') {
  const el = document.getElementById('alert-toast');
  el.textContent = msg;
  el.style.background = type === 'ok' ? 'var(--c-ok)' : type === 'warn' ? 'var(--c-warn)' : 'var(--c-crit)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// Refresh OL countdowns every second
setInterval(() => { SYSTEM_KEYS.forEach(k => { if (overloads[k] && overloads[k] > Date.now()) renderCard(k); }); }, 1000);

// ── Init ───────────────────────────────────────────────────────────────────
connect();
renderAll();
</script>
</body>
</html>
